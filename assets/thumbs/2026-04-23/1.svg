<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="McKinsey 2025 in Charts — five themes">
  <defs>
    <style>
      .mc-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; fill: #4a4a4a; }
      .mc-head  { font-family: Georgia, serif; font-weight: 500; fill: #003A70; letter-spacing: -0.4px; }
      .mc-small { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9px; fill: #8a8a8a; }
      .mc-title { font-family: Georgia, serif; font-weight: 400; font-size: 34px; fill: #003A70; letter-spacing: -1px; }
      .mc-sub   { font-family: Georgia, serif; font-weight: 400; font-size: 14px; font-style: italic; fill: #6a6a6a; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- McKinsey top bar -->
  <rect x="0" y="0" width="800" height="6" fill="#003A70"/>

  <!-- Header -->
  <text x="40" y="44" class="mc-label">MCKINSEY GLOBAL INSTITUTE · 2025 IN CHARTS</text>
  <text x="40" y="88" class="mc-title">The year in five themes</text>
  <text x="40" y="112" class="mc-sub">Demographics · Energy · Labor · Geopolitics · Productivity</text>
  <line x1="40" y1="130" x2="760" y2="130" stroke="#e5ebf1" stroke-width="1"/>

  <!-- Panel 1: Demographics — line chart -->
  <g transform="translate(40,160)">
    <text class="mc-label" y="14">01 · DEMOGRAPHICS</text>
    <text class="mc-head" y="40" font-size="16">Falling fertility</text>
    <polyline points="0,140 20,136 40,132 60,125 80,115 100,100 120,85 140,70" stroke="#0271DC" stroke-width="2.6" fill="none"/>
    <polyline points="0,140 20,136 40,132 60,125 80,115 100,100 120,85 140,70 140,170 0,170" fill="#0271DC" opacity="0.09"/>
    <circle cx="140" cy="70" r="3.5" fill="#003A70"/>
    <text class="mc-small" y="192">Global TFR, 1990–2024</text>
  </g>

  <!-- Panel 2: Energy — vertical bars -->
  <g transform="translate(200,160)">
    <text class="mc-label" y="14">02 · ENERGY TRANSITION</text>
    <text class="mc-head" y="40" font-size="16">Clean capacity surges</text>
    <g transform="translate(0,65)">
      <rect x="0"   y="95"  width="15" height="45" fill="#d4e4f4"/>
      <rect x="22"  y="80"  width="15" height="60" fill="#B4D4F4"/>
      <rect x="44"  y="62"  width="15" height="78" fill="#7BB3E8"/>
      <rect x="66"  y="42"  width="15" height="98" fill="#3B8AD8"/>
      <rect x="88"  y="22"  width="15" height="118" fill="#0271DC"/>
      <rect x="110" y="5"   width="15" height="135" fill="#003A70"/>
    </g>
    <text class="mc-small" y="192">Renewables GW, 2020–2025</text>
  </g>

  <!-- Panel 3: Labor — dual lines -->
  <g transform="translate(360,160)">
    <text class="mc-label" y="14">03 · LABOR</text>
    <text class="mc-head" y="40" font-size="16">Humans + AI pair</text>
    <g transform="translate(0,65)">
      <polyline points="0,90 25,85 50,82 75,78 100,60 125,42 140,32" stroke="#0271DC" stroke-width="2.6" fill="none"/>
      <polyline points="0,120 25,108 50,100 75,82 100,62 125,40 140,20" stroke="#003A70" stroke-width="2.6" fill="none" stroke-dasharray="5 3"/>
      <circle cx="140" cy="32" r="3.5" fill="#0271DC"/>
      <circle cx="140" cy="20" r="3.5" fill="#003A70"/>
    </g>
    <text class="mc-small" y="192">Task output · human ↔ paired</text>
  </g>

  <!-- Panel 4: Geopolitics — dot matrix -->
  <g transform="translate(520,160)">
    <text class="mc-label" y="14">04 · GEOPOLITICS</text>
    <text class="mc-head" y="40" font-size="16">Trade realigns</text>
    <g transform="translate(0,65)">
      <g fill="#0271DC">
        <circle cx="10" cy="30" r="4"/><circle cx="34" cy="44" r="6"/><circle cx="58" cy="22" r="5"/>
        <circle cx="82" cy="50" r="4"/><circle cx="106" cy="36" r="7"/><circle cx="130" cy="28" r="3"/>
      </g>
      <g fill="#003A70" opacity="0.7">
        <circle cx="22" cy="86" r="5"/><circle cx="46" cy="100" r="6"/><circle cx="70" cy="88" r="4"/>
        <circle cx="94" cy="108" r="7"/><circle cx="118" cy="82" r="5"/><circle cx="142" cy="96" r="4"/>
      </g>
    </g>
    <text class="mc-small" y="192">UN-GA voting alignment</text>
  </g>

  <!-- Panel 5: Productivity — horizontal bars -->
  <g transform="translate(680,160)">
    <text class="mc-label" y="14">05 · PRODUCTIVITY</text>
    <text class="mc-head" y="40" font-size="16">Sector gains</text>
    <g transform="translate(0,70)">
      <rect x="0" y="0"  width="90" height="15" fill="#0271DC"/>
      <rect x="0" y="22" width="68" height="15" fill="#3B8AD8"/>
      <rect x="0" y="44" width="52" height="15" fill="#7BB3E8"/>
      <rect x="0" y="66" width="36" height="15" fill="#B4D4F4"/>
      <rect x="0" y="88" width="24" height="15" fill="#d4e4f4"/>
    </g>
    <text class="mc-small" y="192">TFP, sector rank</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="395" x2="760" y2="395" stroke="#e5ebf1" stroke-width="1"/>

  <!-- Source row -->
  <text x="40" y="420" class="mc-sub">Each panel distils 20+ years of data into a single frame.</text>
  <text x="40" y="444" class="mc-small">SOURCE · mckinsey.com/mgi · MGI analysis · chart-engineered by McKinsey Visual Design</text>

  <!-- Badge -->
  <rect x="660" y="410" width="100" height="24" rx="2" fill="#003A70"/>
  <text x="710" y="426" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" text-anchor="middle">MGI · 2025</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="CB Insights · State of AI Q1'26">
  <defs>
    <style>
      .cb-bg     { fill: #0e0e10; }
      .cb-text   { fill: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; }
      .cb-mono   { font-family: 'SF Mono', Menlo, Consolas, monospace; }
      .cb-accent { fill: #FF6A00; }
      .cb-gray   { fill: #a5a5a5; }
    </style>
  </defs>
  <rect class="cb-bg" width="800" height="500"/>

  <!-- Top row: branding + quarter tag -->
  <text x="40" y="44" class="cb-text" font-size="12" font-weight="700" letter-spacing="2.5">CB INSIGHTS · RESEARCH</text>
  <text x="760" y="44" class="cb-text cb-accent" text-anchor="end" font-size="11" font-weight="700" letter-spacing="2" class="cb-mono" font-family="'SF Mono', Menlo, monospace">● Q1 ’26</text>

  <line x1="40" y1="60" x2="760" y2="60" stroke="#3a3a3d" stroke-width="1"/>

  <!-- Headline -->
  <text x="40" y="102" class="cb-text" font-size="16" font-weight="400" letter-spacing="0.6">STATE OF AI · Q1 2026</text>
  <text x="40" y="165" class="cb-text" font-family="'Times New Roman', Georgia, serif" font-size="86" font-weight="400" letter-spacing="-2">$226<tspan font-size="54" fill="#a5a5a5">B</tspan></text>
  <text x="40" y="195" class="cb-text cb-gray" font-size="14" font-style="italic" font-family="Georgia, serif">Private AI funding · Q1 2026 · up 216% QoQ</text>

  <!-- Bar chart below -->
  <g transform="translate(40,240)">
    <!-- Quarterly bars, 5 quarters: Q1'25, Q2'25, Q3'25, Q4'25, Q1'26 -->
    <!-- Base line -->
    <line x1="0" y1="150" x2="720" y2="150" stroke="#3a3a3d" stroke-width="1"/>
    <line x1="0" y1="110" x2="720" y2="110" stroke="#2a2a2d" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="0" y1="70"  x2="720" y2="70"  stroke="#2a2a2d" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="0" y1="30"  x2="720" y2="30"  stroke="#2a2a2d" stroke-width="1" stroke-dasharray="2 3"/>

    <!-- Bars -->
    <g>
      <rect x="30"  y="120" width="80" height="30"  fill="#555"/>
      <rect x="150" y="100" width="80" height="50"  fill="#777"/>
      <rect x="270" y="75"  width="80" height="75"  fill="#999"/>
      <rect x="390" y="98"  width="80" height="52"  fill="#bbb"/>
      <rect x="510" y="5"   width="80" height="145" fill="#FF6A00"/>
    </g>

    <!-- Labels below -->
    <g class="cb-text cb-gray" font-size="10" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">
      <text x="70"  y="170">Q1 ’25</text>
      <text x="190" y="170">Q2 ’25</text>
      <text x="310" y="170">Q3 ’25</text>
      <text x="430" y="170">Q4 ’25</text>
      <text x="550" y="170" fill="#FF6A00" font-weight="700">Q1 ’26</text>
    </g>

    <!-- Top-bar value labels -->
    <g class="cb-text" font-size="10" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" fill="#ffffff">
      <text x="70"  y="115">$52B</text>
      <text x="190" y="95">$60B</text>
      <text x="310" y="70">$72B</text>
      <text x="430" y="93">$72B</text>
    </g>
    <text x="550" y="0" class="cb-text cb-accent" font-size="13" text-anchor="middle" font-weight="700" font-family="'SF Mono', Menlo, monospace">$226B</text>
  </g>

  <!-- Bottom callouts -->
  <g transform="translate(40,430)">
    <rect x="0" y="0" width="230" height="44" fill="#1a1a1c" stroke="#3a3a3d"/>
    <text x="12" y="18" class="cb-text" font-size="9" letter-spacing="1.4" fill="#FF6A00" font-weight="700">MEGA-ROUND SHARE</text>
    <text x="12" y="36" class="cb-text" font-size="16" font-family="'SF Mono', Menlo, monospace" font-weight="700">94% of Q1 funding</text>

    <rect x="246" y="0" width="230" height="44" fill="#1a1a1c" stroke="#3a3a3d"/>
    <text x="258" y="18" class="cb-text" font-size="9" letter-spacing="1.4" fill="#FF6A00" font-weight="700">OPENAI RAISE</text>
    <text x="258" y="36" class="cb-text" font-size="16" font-family="'SF Mono', Menlo, monospace" font-weight="700">$122B · half of total</text>

    <rect x="492" y="0" width="228" height="44" fill="#1a1a1c" stroke="#3a3a3d"/>
    <text x="504" y="18" class="cb-text" font-size="9" letter-spacing="1.4" fill="#FF6A00" font-weight="700">PHYSICAL AI</text>
    <text x="504" y="36" class="cb-text" font-size="16" font-family="'SF Mono', Menlo, monospace" font-weight="700">11% of all AI deals</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="a16z State of AI — 100 trillion tokens">
  <defs>
    <linearGradient id="a16z-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1a1a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </linearGradient>
    <style>
      .az-bg    { fill: #f5f1e8; }
      .az-text  { fill: #1a1a1a; font-family: 'Helvetica Neue', Arial, sans-serif; }
      .az-mono  { font-family: 'SF Mono', Menlo, Consolas, monospace; }
      .az-serif { font-family: Georgia, 'Times New Roman', serif; }
      .az-muted { fill: #8a8280; }
      .az-line  { stroke: #1a1a1a; stroke-width: 2.6; fill: none; }
      .az-grid  { stroke: #d9d2c3; stroke-width: 1; }
      .az-accent{ fill: #1a1a1a; }
    </style>
  </defs>

  <rect class="az-bg" width="800" height="500"/>

  <!-- Grid backdrop -->
  <g class="az-grid">
    <line x1="60"  y1="420" x2="760" y2="420"/>
    <line x1="60"  y1="340" x2="760" y2="340" stroke-dasharray="2 4"/>
    <line x1="60"  y1="260" x2="760" y2="260" stroke-dasharray="2 4"/>
    <line x1="60"  y1="180" x2="760" y2="180" stroke-dasharray="2 4"/>
    <line x1="60"  y1="100" x2="760" y2="100" stroke-dasharray="2 4"/>
  </g>

  <!-- Header -->
  <text x="60" y="54" class="az-text" font-size="11" letter-spacing="2" font-weight="700">ANDREESSEN HOROWITZ · STATE OF AI</text>
  <text x="60" y="92" class="az-text az-serif" font-size="38" font-weight="400" letter-spacing="-0.8">100 trillion tokens, a year</text>

  <!-- Y axis labels -->
  <g class="az-text az-muted az-mono" font-size="10" text-anchor="end">
    <text x="54" y="424">0</text>
    <text x="54" y="344">25T</text>
    <text x="54" y="264">50T</text>
    <text x="54" y="184">75T</text>
    <text x="54" y="104">100T+</text>
  </g>

  <!-- Main growth curve: 2022 → 2026 Q1 -->
  <path d="M 60 418 C 180 415, 260 405, 340 370 S 500 200, 640 130 L 720 95" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Fill under -->
  <path d="M 60 418 C 180 415, 260 405, 340 370 S 500 200, 640 130 L 720 95 L 720 420 L 60 420 Z" fill="url(#a16z-fill)"/>

  <!-- Key data points -->
  <g fill="#1a1a1a">
    <circle cx="180" cy="412" r="3"/>
    <circle cx="340" cy="370" r="3"/>
    <circle cx="520" cy="240" r="3"/>
    <circle cx="720" cy="95"  r="5" stroke="#f5f1e8" stroke-width="2"/>
  </g>

  <!-- Point annotations -->
  <g class="az-text az-mono" font-size="10">
    <text x="180" y="438" fill="#8a8280">2022</text>
    <text x="340" y="438" fill="#8a8280">’23</text>
    <text x="520" y="438" fill="#8a8280">’24</text>
    <text x="720" y="438" fill="#8a8280" text-anchor="end">Q1 ’26</text>
  </g>

  <!-- Callout annotation -->
  <g transform="translate(505,105)">
    <line x1="0" y1="10" x2="205" y2="10" stroke="#1a1a1a" stroke-width="1.2"/>
    <circle cx="210" cy="10" r="3" fill="#1a1a1a"/>
    <text x="0" y="-5" class="az-text az-mono" font-size="9" font-weight="700" letter-spacing="1.2">TODAY · ~1T / DAY</text>
    <text x="0" y="-22" class="az-text az-serif" font-size="14" font-style="italic">"From experiment to utility"</text>
  </g>

  <!-- Footer strip -->
  <line x1="60" y1="454" x2="760" y2="454" stroke="#1a1a1a" stroke-width="1"/>
  <g transform="translate(60,476)">
    <text class="az-text az-mono" font-size="10" font-weight="700" letter-spacing="1.4">● 300+ MODELS · 60+ PROVIDERS · OPENROUTER DATA</text>
  </g>
  <text x="760" y="488" class="az-text az-mono az-muted" font-size="9" text-anchor="end">a16z.com / state-of-ai</text>
</svg>

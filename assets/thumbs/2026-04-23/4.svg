<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Stanford AI Index 2026 — U.S. vs China investment">
  <defs>
    <style>
      .sf-bg     { fill: #ffffff; }
      .sf-card   { fill: #fdfdfc; stroke: #dcd8d1; stroke-width: 1; }
      .sf-red    { fill: #8C1515; }
      .sf-red-stroke { stroke: #8C1515; }
      .sf-text   { fill: #1a1a1a; font-family: 'Source Serif Pro', Georgia, serif; }
      .sf-sans   { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .sf-mute   { fill: #72716F; }
    </style>
  </defs>

  <rect class="sf-bg" width="800" height="500"/>

  <!-- Cardinal header bar -->
  <rect x="0" y="0" width="800" height="40" fill="#8C1515"/>
  <text x="40" y="26" fill="#ffffff" class="sf-sans" font-size="12" letter-spacing="2" font-weight="600">STANFORD HAI · AI INDEX 2026</text>
  <text x="760" y="26" fill="#ffffff" class="sf-sans" font-size="11" letter-spacing="1.5" text-anchor="end" font-weight="400" opacity="0.85">9 CHAPTERS · 300+ CHARTS</text>

  <!-- Title -->
  <text x="40" y="88" class="sf-text" font-size="32" font-weight="400" letter-spacing="-0.5">The investment asymmetry</text>
  <text x="40" y="112" class="sf-text sf-mute" font-size="14" font-style="italic" font-family="'Source Serif Pro', Georgia, serif">Chapter 4 · Economy · 2025 private-AI funding by country</text>

  <line x1="40" y1="132" x2="760" y2="132" stroke="#e5e2dc" stroke-width="1"/>

  <!-- Comparison bars -->
  <g transform="translate(40,165)">
    <!-- US row -->
    <text x="0" y="24" class="sf-text" font-size="16" font-weight="500">United States</text>
    <text x="380" y="24" class="sf-text" font-size="30" font-weight="400" font-family="'Source Serif Pro', Georgia, serif" letter-spacing="-1">$285.9<tspan font-size="18" fill="#72716F">B</tspan></text>
    <rect x="0" y="36" width="720" height="28" fill="#8C1515"/>

    <!-- UK row -->
    <text x="0" y="108" class="sf-text" font-size="16" font-weight="500">United Kingdom</text>
    <text x="380" y="108" class="sf-text" font-size="22" font-weight="400" font-family="'Source Serif Pro', Georgia, serif">$20.1<tspan font-size="14" fill="#72716F">B</tspan></text>
    <rect x="0" y="120" width="52" height="20" fill="#c75a5a"/>

    <!-- China row -->
    <text x="0" y="170" class="sf-text" font-size="16" font-weight="500">China</text>
    <text x="380" y="170" class="sf-text" font-size="22" font-weight="400" font-family="'Source Serif Pro', Georgia, serif">$12.4<tspan font-size="14" fill="#72716F">B</tspan></text>
    <rect x="0" y="182" width="32" height="20" fill="#c75a5a" opacity="0.75"/>

    <!-- Rest of world -->
    <text x="0" y="232" class="sf-text" font-size="16" font-weight="500">Rest of world</text>
    <text x="380" y="232" class="sf-text" font-size="22" font-weight="400" font-family="'Source Serif Pro', Georgia, serif">$52.7<tspan font-size="14" fill="#72716F">B</tspan></text>
    <rect x="0" y="244" width="134" height="20" fill="#c75a5a" opacity="0.5"/>
  </g>

  <!-- Bottom stats strip -->
  <line x1="40" y1="430" x2="760" y2="430" stroke="#e5e2dc" stroke-width="1"/>
  <g transform="translate(40,448)">
    <g>
      <text x="0" y="12" class="sf-sans sf-mute" font-size="10" letter-spacing="1.2" font-weight="600">DATA CENTERS (U.S.)</text>
      <text x="0" y="34" class="sf-text" font-size="22" font-weight="400" font-family="'Source Serif Pro', Georgia, serif">5,427</text>
    </g>
    <g transform="translate(210,0)">
      <text x="0" y="12" class="sf-sans sf-mute" font-size="10" letter-spacing="1.2" font-weight="600">AI INCIDENTS TRACKED</text>
      <text x="0" y="34" class="sf-text" font-size="22" font-weight="400" font-family="'Source Serif Pro', Georgia, serif">362 <tspan font-size="12" fill="#8C1515">↑ from 233</tspan></text>
    </g>
    <g transform="translate(440,0)">
      <text x="0" y="12" class="sf-sans sf-mute" font-size="10" letter-spacing="1.2" font-weight="600">SWE-BENCH VERIFIED</text>
      <text x="0" y="34" class="sf-text" font-size="22" font-weight="400" font-family="'Source Serif Pro', Georgia, serif">60% → 100%</text>
    </g>
  </g>
</svg>
